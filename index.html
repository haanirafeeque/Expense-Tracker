<!DOCTYPE html>
<html lang="en" ng-app="ExpenseTrackerApp">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Expense Tracker</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom Stylesheet -->
  <link href="css/style.css" rel="stylesheet">
</head>

<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-light navbar-custom">
    <div class="container">
      <a class="navbar-brand" href="#!/dashboard">
        <i class="bi bi-wallet2"></i>
        <span>TrackSpend</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <!-- Navigation links. Using custom CSS class 'active-link' based on location path helper -->
        <ul class="navbar-nav ms-auto gap-1" ng-controller="NavController">
          <li class="nav-item">
            <a class="nav-link" ng-class="{'active-link': isActive('/dashboard')}" href="#!/dashboard">
              <i class="bi bi-grid-1x2-fill me-1"></i> Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" ng-class="{'active-link': isActive('/add-expense')}" href="#!/add-expense">
              <i class="bi bi-plus-circle-fill me-1"></i> Add Expense
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" ng-class="{'active-link': isActive('/view-expenses')}" href="#!/view-expenses">
              <i class="bi bi-list-columns-reverse me-1"></i> View Expenses
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main View Container -->
  <div class="container mt-4">
    <!-- ngRoute will dynamically inject views here -->
    <div ng-view class="animate-fade-in"></div>
  </div>

  <!-- AngularJS core files -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <!-- AngularJS routing library -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>

  <!-- Chart.js for data visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

  <!-- Bootstrap 5 Bundle JS (Includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Application Logic Scripts -->
  <!-- App Configuration -->
  <script src="js/app.js"></script>
  <!-- Services -->
  <script src="js/services/ExpenseService.js"></script>
  <!-- Controllers -->
  <script src="js/controllers/ExpenseCtrl.js"></script>
  <script src="js/controllers/ReportCtrl.js"></script>

</body>

</html>
